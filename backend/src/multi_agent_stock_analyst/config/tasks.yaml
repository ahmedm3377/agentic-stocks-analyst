analyze_price_task:
  description: >
    Delegate this task to fetch price data for {ticker}. The assigned agent must determine the 30-day trend, calculate rough price change, and assess volume.
  expected_output: >
    A structured JSON object detailing trend, price change, volume signal, and a brief summary.

analyze_news_task:
  description: >
    Delegate this task to fetch recent news for {ticker}. The assigned agent must summarize the sentiment and identify key catalysts.
  expected_output: >
    A bulleted list of 3-5 key news catalysts and an overall sentiment score (Positive/Negative/Mixed).

write_report_task:
  description: >
    Delegate this task ONLY AFTER the price and news data have been gathered. 
    The assigned agent must use their TXTSearchTool to search the user_preference.txt file, and then tailor a final comprehensive report to match the user's risk tolerance and formatting preferences.
    Ensure they DO NOT hallucinate facts; rely only on provided data.
  expected_output: >
    A highly structured final investment report in JSON format, customized to the user's preferences.